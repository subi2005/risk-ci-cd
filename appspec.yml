version: 0.0
os: linux
files:
  - source: /
    destination: /srv/risk-backend              # app root on the instance
    overwrite: true

permissions:
  - object: /srv/risk-backend
    pattern: "**"
    owner: ec2-user
    group: ec2-user
    mode: 755
    type:
      - file
      - directory

hooks:
  BeforeInstall:
    - location: ci_cd/scripts/before_install.sh
      timeout: 300
      runas: root
  AfterInstall:
    - location: ci_cd/scripts/install_dependencies.sh
      timeout: 1200
      runas: ec2-user
    - location: ci_cd/scripts/migrate_db.sh
      timeout: 600
      runas: ec2-user
  ApplicationStart:
    - location: ci_cd/scripts/start_server.sh
      timeout: 300
      runas: root
  ApplicationStop:
    - location: ci_cd/scripts/stop_server.sh
      timeout: 300
      runas: root
  ValidateService:
    - location: ci_cd/scripts/validate_service.sh
      timeout: 300
      runas: ec2-user
